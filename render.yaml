services:
  - type: web
    name: mantencion-ot
    env: python
    plan: starter
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --threads 4 --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MAINTENANCE_SECRET_KEY
        generateValue: true
      - key: MAINTENANCE_DB_PATH
        value: /var/data/maintenance.db
      - key: MAINTENANCE_DEFAULT_USER
        value: admin
      - key: MAINTENANCE_DEFAULT_PASSWORD
        value: admin12345
      - key: MAINTENANCE_DEFAULT_NAME
        value: Administrador
    disk:
      name: maintenance-data
      mountPath: /var/data
      sizeGB: 1
