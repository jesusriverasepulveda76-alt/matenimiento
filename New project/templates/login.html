{% extends "base.html" %}
{% block title %}Ingreso | Sistema de Mantencion{% endblock %}
{% block content %}
<section class="auth-wrap">
    <article class="card auth-card">
        <h2>Iniciar sesion</h2>
        <p class="muted">Usuario por defecto: <b>admin</b> | Clave: <b>admin12345</b></p>
        <form method="post" class="form-grid single">
            <input type="hidden" name="next" value="{{ next_url }}">
            <label>
                Usuario
                <input type="text" name="username" required autocomplete="username" placeholder="admin">
            </label>
            <label>
                Clave
                <input type="password" name="password" required autocomplete="current-password" placeholder="********">
            </label>
            <div class="form-actions">
                <button type="submit">Ingresar</button>
            </div>
        </form>
    </article>
</section>
{% endblock %}
